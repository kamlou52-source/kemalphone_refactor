# Template CI (devops/ci.yml)
# Usage: copier dans .github/workflows/ ou inclure depuis le repo template
name: Template CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pip-audit flake8 || true
      - name: Lint
        run: flake8 . || true
      - name: Security audit
        run: pip-audit --progress=off || true
      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests"; fi
