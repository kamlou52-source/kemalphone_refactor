
{% extends 'base.html' %}
{% block content %}
<h2>Créer un compte</h2>
<form method="POST" class="form">
  <label>E-mail
    <input type="text" name="email" required>
  </label>
  <label>Mot de passe
    <input type="password" name="password" required>
  </label>
  <button class="btn" type="submit">Créer</button>
</form>
{% endblock %}
